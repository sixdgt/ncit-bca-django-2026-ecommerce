<!-- templates/cart.html -->
{% extends 'layouts/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Your Cart</h2>

    <table class="table">
        <thead>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <!-- Loop items later -->
            <tr>
                <td>Sample Product</td>
                <td>$10</td>
                <td>1</td>
                <td>$10</td>
            </tr>
        </tbody>
    </table>

    <a href="{% url 'checkout.page' %}" class="btn btn-primary">
        Proceed to Checkout
    </a>
</div>
{% endblock %}
