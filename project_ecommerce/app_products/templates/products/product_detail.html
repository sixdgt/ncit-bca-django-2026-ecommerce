{% extends 'layouts/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block body_content %}
    <div class="d-flex flex-column align-items-center justify-content-around width-100 bg-light p-4 width-100">
        <a href="{% url 'product.index' %}" class="btn btn-primary btn-block btn-sm mb-3">View Product List</a>

       <div class="card">
        <div class="card-header">
            <h1 class="card-title">{{ product.title }}</h1>
        </div>
        <div class="card-body">
            <p class="card-text">{{ product.description }}</p>
            <p class="card-text">Price: ${{ product.price }}</p>
            <p class="card-text">Quantity: {{ product.quantity }}</p>
        </div>
       </div>
    </div>
{% endblock %}
